<!DOCTYPE html>
<html>
<head>
<title>PadiBuddy Final</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Arial;background:#111;color:white;}
.hidden{display:none;}
.center{text-align:center;margin-top:100px;}
input,select{padding:8px;margin:5px;width:220px;}
button{padding:8px 15px;margin:5px;cursor:pointer;}
.sidebar{position:fixed;left:0;top:0;width:200px;height:100vh;background:#222;padding-top:20px;}
.sidebar button{display:block;width:90%;margin:10px auto;}
.main{margin-left:200px;padding:20px;}
.page{display:none;}
.active{display:block;}
.task{background:#333;margin:5px;padding:8px;display:flex;justify-content:space-between;}
.chatBox{background:#222;height:200px;overflow-y:auto;padding:10px;margin-bottom:10px;}
.user{color:#4ea1ff;text-align:right;}
.ai{color:#90ee90;text-align:left;}
table{width:100%;border-collapse:collapse;text-align:center;}
th,td{border:1px solid #444;padding:5px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
<h2>Login</h2>
<input id="loginUser" placeholder="Username"><br>
<input id="loginPass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button><br>
<button onclick="showRegister()">Go to Register</button>
</div>

<!-- REGISTER -->
<div id="registerPage" class="center hidden">
<h2>Register</h2>
<input id="regUser" placeholder="Username"><br>
<input id="regPass" type="password" placeholder="Password"><br>
<button onclick="register()">Register</button><br>
<button onclick="showLogin()">Go to Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="sidebar">
<button onclick="openPage('dashboard')">Dashboard</button>
<button onclick="openPage('tasks')">Tasks</button>
<button onclick="openPage('schedule')">Schedule</button>
<button onclick="openPage('analytics')">Analytics</button>
<button onclick="openPage('ai')">AI</button>
<button onclick="openPage('profile')">Profile</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<div id="dashboard" class="page active">
<h2 id="welcome"></h2>
<p>🔥 Streak: <span id="streak">0</span></p>
<button onclick="updateStreak()">Update Streak</button>
</div>

<div id="tasks" class="page">
<input id="taskInput" placeholder="Task">
<button onclick="addTask()">Add</button>
<div id="taskList"></div>
</div>

<div id="schedule" class="page">
<h3>Auto Timetable</h3>
<input id="subjects" placeholder="Math, Science, English">
<select id="hours">
<option value="1">1 hr</option>
<option value="2">2 hr</option>
<option value="3">3 hr</option>
</select>
<button onclick="generateSchedule()">Generate</button>

<table>
<tr><th>Day</th><th>Plan</th></tr>
<tr><td>Mon</td><td id="Mon"></td></tr>
<tr><td>Tue</td><td id="Tue"></td></tr>
<tr><td>Wed</td><td id="Wed"></td></tr>
<tr><td>Thu</td><td id="Thu"></td></tr>
<tr><td>Fri</td><td id="Fri"></td></tr>
</table>
</div>

<div id="analytics" class="page">
<p>Total Tasks: <span id="total"></span></p>
<p>Completed: <span id="done"></span></p>
<p>Completion: <span id="percent"></span>%</p>
</div>

<div id="ai" class="page">
<div id="chat" class="chatBox"></div>
<input id="aiInput" placeholder="Ask">
<button onclick="askAI()">Send</button>
</div>

<div id="profile" class="page">
<p id="profileText"></p>
</div>

</div>
</div>

<script>
var currentUser=null;

/* NAV */
function showRegister(){loginPage.classList.add("hidden");registerPage.classList.remove("hidden");}
function showLogin(){registerPage.classList.add("hidden");loginPage.classList.remove("hidden");}

/* REGISTER */
function register(){
var u=regUser.value.trim();
var p=regPass.value.trim();
if(!u||!p){alert("Fill fields");return;}
var users=JSON.parse(localStorage.getItem("users"))||{};
if(users[u]){alert("User exists");return;}
users[u]={password:p,tasks:[],streak:0,lastDate:null};
localStorage.setItem("users",JSON.stringify(users));
alert("Registered!");
showLogin();
}

/* LOGIN */
function login(){
var u=loginUser.value.trim();
var p=loginPass.value.trim();
var users=JSON.parse(localStorage.getItem("users"))||{};
if(users[u]&&users[u].password===p){
currentUser=u;
loginPage.classList.add("hidden");
app.classList.remove("hidden");
loadUser();
}else alert("Invalid");
}

/* LOAD */
function loadUser(){
var users=JSON.parse(localStorage.getItem("users"));
var user=users[currentUser];
welcome.innerText="Welcome "+currentUser;
streak.innerText=user.streak;
profileText.innerHTML="Username: "+currentUser+"<br>Streak: "+user.streak;
loadTasks();
updateAnalytics();
}

/* PAGE */
function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* TASK */
function addTask(){
var text=taskInput.value.trim();
if(!text)return;
var users=JSON.parse(localStorage.getItem("users"));
users[currentUser].tasks.push({text:text,done:false});
localStorage.setItem("users",JSON.stringify(users));
taskInput.value="";
loadTasks();
}

function loadTasks(){
var users=JSON.parse(localStorage.getItem("users"));
var user=users[currentUser];
taskList.innerHTML="";
user.tasks.forEach((t,i)=>{
var d=document.createElement("div");
d.className="task";
d.innerHTML="<span>"+t.text+"</span>";
var c=document.createElement("input");
c.type="checkbox";
c.checked=t.done;
c.onchange=function(){
user.tasks[i].done=this.checked;
localStorage.setItem("users",JSON.stringify(users));
updateAnalytics();
};
d.appendChild(c);
taskList.appendChild(d);
});
}

/* STREAK */
function updateStreak(){
var users=JSON.parse(localStorage.getItem("users"));
var user=users[currentUser];
var today=new Date().toDateString();
if(user.lastDate===today){alert("Already updated");return;}
user.streak++;
user.lastDate=today;
localStorage.setItem("users",JSON.stringify(users));
streak.innerText=user.streak;
}

/* ANALYTICS */
function updateAnalytics(){
var users=JSON.parse(localStorage.getItem("users"));
var user=users[currentUser];
var totalTasks=user.tasks.length;
var doneTasks=user.tasks.filter(t=>t.done).length;
total.innerText=totalTasks;
done.innerText=doneTasks;
percent.innerText=totalTasks?Math.round((doneTasks/totalTasks)*100):0;
}

/* TIMETABLE */
function generateSchedule(){
var subs=subjects.value.split(",");
var h=hours.value;
var days=["Mon","Tue","Wed","Thu","Fri"];
for(var i=0;i<days.length;i++){
var s=subs[i%subs.length].trim();
document.getElementById(days[i]).innerText=s+" - "+h+" hr";
}
}

/* AI */
function askAI(){
var q=aiInput.value.trim();
if(!q)return;
chat.innerHTML+="<div class='user'>"+q+"</div>";
var users=JSON.parse(localStorage.getItem("users"));
var user=users[currentUser];
var res="Keep going!";
if(q.includes("plan"))res="You have "+user.tasks.length+" tasks.";
if(q.includes("study"))res="Focus 45 mins + break.";
chat.innerHTML+="<div class='ai'>"+res+"</div>";
aiInput.value="";
chat.scrollTop=chat.scrollHeight;
}

/* LOGOUT */
function logout(){location.reload();}
</script>

</body>
</html>
